# ── RODAID · docker-compose producción ───────────────────
# Para: VPS Hetzner / DigitalOcean / EC2 standalone
# Uso:  docker compose -f docker-compose.prod.yml up -d

version: '3.9'

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:

  postgres:
    <<: [*restart, *logging]
    image: postgres:16-alpine
    container_name: rodaid_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-rodaid_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}      # requerida en .env
      POSTGRES_DB:       ${POSTGRES_DB:-rodaid_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Las migrations se aplican manualmente una sola vez
    networks: [rodaid]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-rodaid_user}"]
      interval: 10s; timeout: 5s; retries: 5

  redis:
    <<: [*restart, *logging]
    image: redis:7-alpine
    container_name: rodaid_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks: [rodaid]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s; timeout: 5s; retries: 5

  api:
    <<: [*restart, *logging]
    image: ${DOCKER_IMAGE:-rodaid-api:latest}
    container_name: rodaid_api
    environment:
      NODE_ENV:            production
      PORT:                3001
      API_VERSION:         v1
      DATABASE_URL:        postgresql://${POSTGRES_USER:-rodaid_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rodaid_db}
      REDIS_URL:           redis://redis:6379
      JWT_SECRET:          ${JWT_SECRET}
      JWT_ACCESS_EXPIRES:  ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      ALLOWED_ORIGINS:     ${ALLOWED_ORIGINS:-https://rodaid.com.ar}
      BFA_RPC_URL:         ${BFA_RPC_URL:-}
      BFA_WALLET_PRIVATE_KEY: ${BFA_WALLET_PRIVATE_KEY:-}
      BFA_CONTRACT_ADDRESS:   ${BFA_CONTRACT_ADDRESS:-}
      MXM_CLIENT_ID:       ${MXM_CLIENT_ID:-}
      MXM_CLIENT_SECRET:   ${MXM_CLIENT_SECRET:-}
    networks: [rodaid]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:3001/api/v1/health"]
      interval: 30s; timeout: 10s; retries: 3; start_period: 20s

  nginx:
    <<: [*restart, *logging]
    image: nginx:alpine
    container_name: rodaid_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/rodaid.conf:/etc/nginx/conf.d/default.conf:ro
      - certbotdata:/etc/letsencrypt:ro
      - certbotwww:/var/www/certbot:ro
    networks: [rodaid]
    depends_on: [api]

  certbot:
    image: certbot/certbot
    container_name: rodaid_certbot
    volumes:
      - certbotdata:/etc/letsencrypt
      - certbotwww:/var/www/certbot
    # Renovación automática cada 12 horas
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    <<: *logging

volumes:
  pgdata:
  redisdata:
  certbotdata:
  certbotwww:

networks:
  rodaid:
    driver: bridge
