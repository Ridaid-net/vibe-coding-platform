# ── RODAID · Deploy → Railway ─────────────────────────────
# Dispara en: push a main (merge de PR)
# Pasos: CI → Build Docker → Push → Railway redeploy

name: Deploy → Railway

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # nunca cancelar un deploy en curso

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 1. Verificaciones previas ─────────────────────
      - name: Type check
        run: npm ci && npx tsc --noEmit

      # ── 2. Railway CLI deploy ─────────────────────────
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy a Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service rodaid-api --detach

      # ── 3. Smoke test post-deploy ─────────────────────
      - name: Smoke test
        env:
          API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          sleep 20   # esperar que Railway termine el redeploy
          STATUS=$(curl -sf "$API_URL/api/v1/health" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("ok","false"))')
          echo "Health check: $STATUS"
          [ "$STATUS" = "True" ] || (echo "Smoke test FALLÓ — rollback manual requerido" && exit 1)

      # ── 4. Notificación ───────────────────────────────
      - name: Notificar deploy exitoso
        if: success()
        run: echo "✅ Deploy a Railway completado · $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Notificar fallo
        if: failure()
        run: echo "❌ Deploy a Railway FALLÓ · revisar logs en Railway dashboard"
