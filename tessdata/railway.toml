# ── RODAID · Railway configuration ───────────────────────
# https://docs.railway.app/reference/config-as-code

[build]
builder       = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand  = "node dist/server.js"
healthcheckPath    = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "rodaid-api"

[services.build]
builder = "DOCKERFILE"

# Variables configuradas en Railway Dashboard
# (no poner valores reales aquí — solo documentar nombres)
# DATABASE_URL       → Railway PostgreSQL plugin (auto-provisto)
# REDIS_URL          → Railway Redis plugin (auto-provisto)
# JWT_SECRET         → Settings → Variables
# BFA_RPC_URL        → Settings → Variables
# BFA_WALLET_PRIVATE_KEY → Settings → Variables
# BFA_CONTRACT_ADDRESS   → Settings → Variables
# MXM_CLIENT_ID      → Settings → Variables
# MXM_CLIENT_SECRET  → Settings → Variables
