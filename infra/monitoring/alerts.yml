# RODAID · Alertas de monitoring
# Integrar con Railway/Render environment variables o Secrets Manager

alerts:
  # ── Umbrales de performance ──────────────────────────────
  response_time_warning_ms:  500    # Advertencia
  response_time_critical_ms: 2000   # Crítico

  # ── PostgreSQL pool ───────────────────────────────────────
  db_pool_waiting_warning:  3       # Conexiones esperando
  db_pool_waiting_critical: 10

  # ── Memoria del proceso ───────────────────────────────────
  memory_warning_mb:  400
  memory_critical_mb: 700

  # ── Cola de trabajos fallidos ─────────────────────────────
  queue_failed_warning:  5
  queue_failed_critical: 20

  # ── Canales de notificación ───────────────────────────────
  channels:
    email:
      - ops@rodaid.com.ar
    webhook:
      - ${SLACK_WEBHOOK_URL}    # Slack #alertas-prod
    sms:
      - ${OPS_PHONE}            # Solo para P1 (down total)

  # ── Escalamiento ─────────────────────────────────────────
  escalation:
    p1_down:    immediate   # email + SMS + Slack
    p2_degraded: 5_minutes  # email + Slack
    p3_slow:    15_minutes  # solo Slack
