# ── RODAID · Nginx reverse proxy ──────────────────────────

# Rate limiting: 20 req/s por IP para API general
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
# Rate limiting estricto para auth: 5 req/s
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

upstream rodaid_api {
  server api:3001;
  keepalive 32;
}

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name api.rodaid.com.ar;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

# HTTPS
server {
  listen 443 ssl http2;
  server_name api.rodaid.com.ar;

  ssl_certificate     /etc/letsencrypt/live/api.rodaid.com.ar/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.rodaid.com.ar/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:50m;

  # Headers de seguridad
  add_header Strict-Transport-Security "max-age=63072000; includeSubdomains" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Rate limiting general
  limit_req zone=api burst=40 nodelay;
  limit_req_status 429;

  # Auth endpoints — límite estricto
  location ~ ^/api/v1/auth/(register|login) {
    limit_req zone=auth burst=10 nodelay;
    proxy_pass http://rodaid_api;
    include /etc/nginx/conf.d/proxy_params;
  }

  # API general
  location /api/ {
    proxy_pass http://rodaid_api;
    include /etc/nginx/conf.d/proxy_params;
  }

  # Health check sin rate limit
  location /api/v1/health {
    limit_req off;
    proxy_pass http://rodaid_api;
    access_log off;
  }
}
