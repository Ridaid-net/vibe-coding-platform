# RODAID — configuración de Netlify.
#
# Hito 19: vincula la Edge Function `auth-admin` (control de acceso basado en
# roles) a TODAS las superficies de administración. Al declararla aquí, la
# función se ejecuta primero (config-based), antes que cualquier regla de
# _redirects o que la función de origen, garantizando la defensa en profundidad.
[[edge_functions]]
function = "auth-admin"
path = "/api/v1/admin/*"
[build]
  command = "pnpm run build"

[[redirects]]
  from = "https://rodaid.com/*"
  to = "https://rodaid.net/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.rodaid.com/*"
  to = "https://rodaid.net/:splat"
  status = 301
  force = true

[[headers]]
  for = '/_next/static/*'
  [headers.values]
    Cache-Control = 'public, max-age=31536000, immutable'

[[headers]]
  for = '/favicon.ico'
  [headers.values]
    Cache-Control = 'public, max-age=86400'

[[headers]]
  for = '/og-image.png'
  [headers.values]
    Cache-Control = 'public, max-age=86400'

[[headers]]
  for = '/logo-rodaid.jpeg'
  [headers.values]
    Cache-Control = 'public, max-age=86400'

[[headers]]
  for = '/sitemap.xml'
  [headers.values]
    Cache-Control = 'public, max-age=3600'
    Content-Type = 'application/xml'

[[headers]]
  for = '/robots.txt'
  [headers.values]
    Cache-Control = 'public, max-age=86400'

[[headers]]
  for = '/api/*'
  [headers.values]
    Cache-Control = 'no-store, no-cache'
    X-Content-Type-Options = 'nosniff'
    X-Frame-Options = 'DENY'
    X-XSS-Protection = '1; mode=block'
